<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Verkstad - Bygg CV</title>

    <link rel="stylesheet" href="css/builder.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<nav class="navbar">

    <div class="logo">
        CV Verkstad
    </div>

    <div class="menu">
        <a href="index.html">Hem</a>
        <a href="builder.html" class="active">Bygg CV</a>
        <a href="templates.html">Mallar</a>
    </div>

</nav>

<div class="builder">

    <aside class="sidebar">

        <h1>Bygg ditt CV</h1>

        <section class="card">

            <h2>Personuppgifter</h2>

            <label>Profilbild</label>
            <input type="file" id="photo" accept="image/*">

            <label>Namn</label>
            <input id="name" type="text" placeholder="För- och efternamn">

            <label>Yrkestitel</label>
            <input id="title" type="text" placeholder="Exempel: Driftledare">

            <label>E-post</label>
            <input id="email" type="email">

            <label>Telefon</label>
            <input id="phone" type="text">

            <label>Adress</label>
            <input id="address" type="text">

            <label>LinkedIn</label>
            <input id="linkedin" type="text">

            <label>Om mig</label>
            <textarea id="about" rows="6"></textarea>

        </section>
