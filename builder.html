<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Byggare</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="builder">

<div class="form">

<h2>Personuppgifter</h2>

<input id="name" type="text" placeholder="Namn">

<input id="title" type="text" placeholder="Yrkestitel">

<input id="email" type="email" placeholder="E-post">

<input id="phone" type="text" placeholder="Telefon">
  <label>Profilbild</label>
<input type="file" id="photo" accept="image/*">

<textarea id="about" placeholder="Berätta om dig själv"></textarea>

<h2>Arbetslivserfarenhet</h2>

<div id="jobs"></div>

<button id="addJob">+ Lägg till jobb</button>

<h2>Utbildning</h2>

<div id="education"></div>

<button id="addEducation">+ Lägg till utbildning</button>
<h2>Kompetenser</h2>

<div id="skills"></div>

<button id="addSkill">+ Lägg till kompetens</button>
</div>
<div class="preview">
<img id="previewPhoto" src="" alt="Profilbild" style="display:none;">
<h1 id="previewName">
Ditt Namn
</h1>

<h3 id="previewTitle">
Yrkestitel
</h3>

<p id="previewAbout">
Här visas din profil.
</p>
<h2>Kompetenser</h2>

<ul id="previewSkills"></ul>
  <h2>Arbetslivserfarenhet</h2>

<div id="previewJobs"></div>
</div>

</div>
<button id="downloadPdf">Ladda ner som PDF</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="js/app.js"></script>

</body>

</html>
