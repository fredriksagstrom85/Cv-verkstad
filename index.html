<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Verkstad</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f6fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:#fff;
  padding:40px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
  text-align:center;
}
button{
  background:#1565c0;
  color:#fff;
  border:none;
  padding:12px 24px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>
<body>
<div class="card">
  <h1>CV Verkstad</h1>
  <p>Skapa ett professionellt CV gratis.</p>
  <button>Kom igång</button>
</div>
</body>
</html>
